<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>対象店舗判定ツール</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --border: #d9dee8;
      --primary: #2457ff;
      --ok: #0f8a4b;
      --warn: #b35a00;
      --ng: #b42318;
      --soft-ok: #e9f8ef;
      --soft-warn: #fff3e0;
      --soft-ng: #fff0ee;
      --shadow: 0 20px 50px rgba(20, 30, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #eaf0ff 0, transparent 34%), var(--bg);
      padding: 32px 16px;
    }

    .container {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 42px);
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(8px);
    }

    .search-area {
      display: grid;
      gap: 12px;
    }

    label {
      font-weight: 700;
      font-size: 15px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 18px;
      outline: none;
      background: white;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(36, 87, 255, 0.12);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 0 20px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      color: white;
      background: var(--primary);
      white-space: nowrap;
    }

    .result {
      margin-top: 20px;
      border-radius: 20px;
      padding: 18px;
      border: 1px solid var(--border);
      background: #fafbff;
    }

    .result.ok {
      border-color: rgba(15, 138, 75, 0.35);
      background: var(--soft-ok);
    }

    .result.warn {
      border-color: rgba(179, 90, 0, 0.35);
      background: var(--soft-warn);
    }

    .result.ng {
      border-color: rgba(180, 35, 24, 0.35);
      background: var(--soft-ng);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 10px;
      background: white;
    }

    .ok .badge { color: var(--ok); }
    .warn .badge { color: var(--warn); }
    .ng .badge { color: var(--ng); }

    .result h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .result p {
      margin: 8px 0 0;
      color: #344054;
      line-height: 1.7;
    }

    .matched {
      margin-top: 10px;
      font-weight: 700;
    }

    .note {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      color: #475467;
      font-size: 14px;
      line-height: 1.65;
    }

    .section {
      margin-top: 22px;
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--border);
      background: white;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 13px;
      color: #344054;
      cursor: pointer;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    .mini-card {
      border: 1px solid var(--border);
      background: white;
      border-radius: 18px;
      padding: 16px;
    }

    .mini-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .mini-card ul {
      margin: 0;
      padding-left: 18px;
      color: #475467;
      line-height: 1.7;
      font-size: 14px;
    }

    @media (max-width: 720px) {
      body {
        padding: 20px 12px;
      }

      .card {
        padding: 18px;
        border-radius: 20px;
      }

      .input-row {
        flex-direction: column;
      }

      button {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>対象店舗判定ツール</h1>
      <p class="lead">店舗名を入力すると、店頭支払い対象・モバイルオーダー対象かを判定します。商業施設内など一部対象外があるので、最後は公式の対象店舗一覧も確認してください。まあ、例外が多い時点で人間社会の敗北です。</p>
    </header>

    <section class="card">
      <div class="search-area">
        <label for="storeInput">店舗名</label>
        <div class="input-row">
          <input id="storeInput" type="text" placeholder="例：スシロー、マクドナルド、ナチュラルローソン、スタバ" autocomplete="off" />
          <button id="clearButton" type="button">クリア</button>
        </div>
      </div>

      <div id="result" class="result warn" aria-live="polite">
        <span class="badge">入力待ち</span>
        <h2>店舗名を入力してください</h2>
        <p>例として「マクドナルド」「ローソン」「スターバックス」などを入れると判定します。</p>
      </div>

      <div class="section">
        <h3>よく使いそうな店舗</h3>
        <div class="chips" id="quickButtons"></div>
      </div>

      <div class="grid">
        <div class="mini-card">
          <h3>店頭支払い対象</h3>
          <ul id="inStoreList"></ul>
        </div>
        <div class="mini-card">
          <h3>モバイルオーダー対象</h3>
          <ul id="mobileList"></ul>
        </div>
      </div>
    </section>
  </main>

  <script>
    const inStoreTargets = [
      {
        name: "セイコーマート",
        aliases: ["セイコーマート", "seicomart", "セコマ", "タイエー", "ハマナスクラブ", "ハセガワストア"],
        note: "タイエー、ハマナスクラブ、ハセガワストアも対象です。"
      },
      { name: "セブン-イレブン", aliases: ["セブンイレブン", "セブン-イレブン", "セブン", "7-eleven", "seven eleven"] },
      { name: "ポプラ", aliases: ["ポプラ", "生活彩家"], note: "生活彩家も対象です。" },
      { name: "ミニストップ", aliases: ["ミニストップ", "ministop"] },
      {
        name: "ローソン",
        aliases: ["ローソン", "lawson", "ナチュラルローソン", "ローソンストア100", "ローソンスリーエフ", "スリーエフ"],
        note: "ナチュラルローソン、ローソンストア100、ローソンスリーエフも対象です。"
      },
      { name: "マクドナルド", aliases: ["マクドナルド", "マック", "マクド", "mcdonald", "mcdonalds"] },
      { name: "モスバーガー", aliases: ["モスバーガー", "モス", "モスバーガー＆カフェ", "モスバーガー&カフェ", "mos burger"], note: "モスバーガー＆カフェも対象です。" },
      { name: "ケンタッキーフライドチキン", aliases: ["ケンタッキー", "ケンタ", "kfc", "ケンタッキーフライドチキン"] },
      { name: "吉野家", aliases: ["吉野家", "yoshinoya"] },
      { name: "サイゼリヤ", aliases: ["サイゼリヤ", "サイゼ", "saizeriya"] },
      { name: "ガスト", aliases: ["ガスト", "gusto"] },
      { name: "バーミヤン", aliases: ["バーミヤン", "bamiyan"] },
      { name: "しゃぶ葉", aliases: ["しゃぶ葉", "しゃぶよう"] },
      { name: "ジョナサン", aliases: ["ジョナサン", "jonathan"] },
      { name: "夢庵", aliases: ["夢庵", "ゆめあん"] },
      {
        name: "その他すかいらーくグループ飲食店",
        aliases: ["ステーキガスト", "から好し", "からよし", "むさしの森珈琲", "藍屋", "グラッチェガーデンズ", "魚屋路", "chawan", "チャワン", "la ohana", "ラオハナ", "とんから亭", "ゆめあん食堂", "桃菜", "八郎そば", "三〇三", "303"],
        note: "記載のすかいらーく系ブランドのみ対象です。その他のすかいらーくグループ飲食店は対象外です。"
      },
      { name: "すき家", aliases: ["すき家", "すきや", "sukiya"] },
      { name: "はま寿司", aliases: ["はま寿司", "はまずし", "hamazushi"] },
      { name: "ココス", aliases: ["ココス", "cocos"] },
      { name: "ドトールコーヒーショップ", aliases: ["ドトール", "ドトールコーヒー", "ドトールコーヒーショップ", "doutor"] },
      { name: "エクセルシオール カフェ", aliases: ["エクセルシオール", "エクセルシオールカフェ", "excelsior"] },
      { name: "かっぱ寿司", aliases: ["かっぱ寿司", "かっぱずし", "kappa sushi"] }
    ];

    const mobileTargets = [
      { name: "マクドナルド", aliases: ["マクドナルド", "マック", "マクド", "mcdonald", "mcdonalds"] },
      { name: "モスバーガー", aliases: ["モスバーガー", "モス", "モスバーガー＆カフェ", "モスバーガー&カフェ", "mos burger"], note: "配達サービスも対象ですが、他社サービス経由の配達は対象外です。" },
      { name: "ケンタッキーフライドチキン", aliases: ["ケンタッキー", "ケンタ", "kfc", "ケンタッキーフライドチキン"], note: "配達サービスも対象ですが、他社サービス経由の配達は対象外です。" },
      { name: "吉野家", aliases: ["吉野家", "yoshinoya"] },
      { name: "すき家", aliases: ["すき家", "すきや", "sukiya"] },
      { name: "スターバックス", aliases: ["スターバックス", "スタバ", "starbucks"], note: "スターバックスのアプリまたはApp Clip経由のApple Pay決済のみ対象です。スターバックス カードへのチャージは対象外です。" }
    ];

    const knownNegativeHints = [
      { name: "スシロー", aliases: ["スシロー", "sushiro"], note: "提示された対象店舗一覧には含まれていません。はま寿司・かっぱ寿司は対象ですが、スシローは対象外判定です。" },
      { name: "くら寿司", aliases: ["くら寿司", "くらずし", "kura sushi"], note: "提示された対象店舗一覧には含まれていません。" },
      { name: "ファミリーマート", aliases: ["ファミマ", "ファミリーマート", "familymart"], note: "提示された対象店舗一覧には含まれていません。" },
      { name: "スターバックス カードへのチャージ", aliases: ["スターバックスカード", "スタバカード", "スターバックス カード", "チャージ"], note: "スターバックス カードへのチャージは対象外です。" }
    ];

    const storeInput = document.getElementById("storeInput");
    const result = document.getElementById("result");
    const clearButton = document.getElementById("clearButton");
    const quickButtons = document.getElementById("quickButtons");
    const inStoreList = document.getElementById("inStoreList");
    const mobileList = document.getElementById("mobileList");

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[\s　・･\-ー―−＿_]/g, "")
        .replace(/＆/g, "&")
        .replace(/[（）()]/g, "")
        .trim();
    }

    function findMatch(input, targets) {
      const normalizedInput = normalize(input);
      if (!normalizedInput) return null;

      for (const target of targets) {
        for (const alias of target.aliases) {
          const normalizedAlias = normalize(alias);
          if (normalizedInput.includes(normalizedAlias) || normalizedAlias.includes(normalizedInput)) {
            return { ...target, matchedAlias: alias };
          }
        }
      }
      return null;
    }

    function renderResult() {
      const value = storeInput.value;
      const trimmed = value.trim();

      if (!trimmed) {
        result.className = "result warn";
        result.innerHTML = `
          <span class="badge">入力待ち</span>
          <h2>店舗名を入力してください</h2>
          <p>例として「マクドナルド」「ローソン」「スターバックス」などを入れると判定します。</p>
        `;
        return;
      }

      const inStore = findMatch(trimmed, inStoreTargets);
      const mobile = findMatch(trimmed, mobileTargets);
      const negative = findMatch(trimmed, knownNegativeHints);

      if (inStore || mobile) {
        const labels = [];
        if (inStore) labels.push("店頭支払い対象");
        if (mobile) labels.push("モバイルオーダー対象");

        const notes = [];
        if (inStore && inStore.note) notes.push(inStore.note);
        if (mobile && mobile.note) notes.push(mobile.note);
        notes.push("商業施設内の店舗など、一部ポイント加算の対象外となる店舗があります。実店舗まで完全判定できるほど世界は親切にできていません。");

        result.className = "result ok";
        result.innerHTML = `
          <span class="badge">対象</span>
          <h2>${escapeHtml(trimmed)} は ${labels.join("・")} です</h2>
          <p class="matched">一致した対象名：${escapeHtml((inStore || mobile).name)}</p>
          <p>入力内容は対象店舗一覧に含まれるブランドと一致しました。</p>
          <div class="note">${notes.map(escapeHtml).join("<br>")}</div>
        `;
        return;
      }

      if (negative) {
        result.className = "result ng";
        result.innerHTML = `
          <span class="badge">対象外の可能性が高い</span>
          <h2>${escapeHtml(trimmed)} は対象一覧にありません</h2>
          <p>${escapeHtml(negative.note)}</p>
          <div class="note">対象に見える別ブランドと混同しやすいので注意してください。寿司屋を全部対象にしないあたり、カード会社もなかなか渋い。</div>
        `;
        return;
      }

      result.className = "result ng";
      result.innerHTML = `
        <span class="badge">対象外または未登録</span>
        <h2>${escapeHtml(trimmed)} は対象一覧に見つかりません</h2>
        <p>提示された対象店舗一覧には一致するブランドがありませんでした。</p>
        <div class="note">表記ゆれの可能性もあるため、正式名称で再入力してください。例：セブン、ローソン、はま寿司、かっぱ寿司、スタバなど。</div>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function createChip(name) {
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = name;
      chip.addEventListener("click", () => {
        storeInput.value = name;
        renderResult();
        storeInput.focus();
      });
      return chip;
    }

    function renderLists() {
      const quick = ["スシロー", "マクドナルド", "ローソン", "ナチュラルローソン", "スターバックス", "はま寿司", "かっぱ寿司", "サイゼリヤ", "ケンタッキー", "ファミマ"];
      quick.forEach(name => quickButtons.appendChild(createChip(name)));

      inStoreTargets.forEach(target => {
        const li = document.createElement("li");
        li.textContent = target.name;
        inStoreList.appendChild(li);
      });

      mobileTargets.forEach(target => {
        const li = document.createElement("li");
        li.textContent = target.name;
        mobileList.appendChild(li);
      });
    }

    storeInput.addEventListener("input", renderResult);
    clearButton.addEventListener("click", () => {
      storeInput.value = "";
      renderResult();
      storeInput.focus();
    });

    renderLists();
  </script>
</body>
</html>
